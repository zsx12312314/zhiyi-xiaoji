        <button class="btn btn-secondary btn-sm" onclick="setProfileAvatar('none');closeModal()">🚫 不设头像</button>
        <button class="btn btn-secondary btn-sm" onclick="showCartoonPicker()">🎨 卡通头像</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('profile-avatar-upload').click()">📷 上传图片</button>
      </div>
      <input type="file" id="profile-avatar-upload" accept="image/*" class="hidden" onchange="uploadProfileAvatar(this)">
    </div>
  `);
}
window.changeAvatar = changeAvatar;

function showCartoonPicker() {
  let html = '<div class="grid grid-cols-5 gap-3">';
  CARTOON_AVATARS.forEach(a => {
    html += `<div class="aspect-square rounded-full flex items-center justify-center text-3xl cursor-pointer hover:scale-110 transition-transform" style="background:${a.bg}" onclick="setProfileAvatar('cartoon','${a.id}');closeModal()">${a.icon || a.emoji}</div>`;
  });
  html += '</div>';
  showModal('选择卡通头像', html);
}
window.showCartoonPicker = showCartoonPicker;

async function setProfileAvatar(mode, cartoonId) {
  if (!supabase || !STATE.profile) return;
  let avatarUrl = '';
  if (mode === 'cartoon' && cartoonId) {
    avatarUrl = cartoonId;
  }
  await _sb.from('profiles').update({ avatar_mode: mode, avatar_url: avatarUrl, updated_at: new Date() }).eq('id', STATE.user.id);
  STATE.profile.avatar_mode = mode;
  STATE.profile.avatar_url = avatarUrl;
  renderProfile($('#page-content'));
  updateNavbar();
  showToast('头像已更新', 'success');
}
window.setProfileAvatar = setProfileAvatar;

async function uploadProfileAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('图片大小不能超过2MB', 'warning'); return; }
  try {
    const blob = await compressImage(file);
    if (!supabase || !STATE.profile) return;
    const path = `${STATE.user.id}/avatar.${file.type.split('/')[1] || 'jpg'}`;
    const { error } = await _sb.storage.from('avatars').upload(path, blob, { upsert: true });
    if (error) { showToast('上传失败：' + error.message, 'error'); return; }
    const { data: { publicUrl } } = _sb.storage.from('avatars').getPublicUrl(path);
    await _sb.from('profiles').update({ avatar_mode: 'upload', avatar_url: publicUrl, updated_at: new Date() }).eq('id', STATE.user.id);
    STATE.profile.avatar_mode = 'upload';
    STATE.profile.avatar_url = publicUrl;
    closeModal();
    renderProfile($('#page-content'));
    updateNavbar();
    showToast('头像已上传', 'success');
  } catch (e) {
    showToast('上传失败：' + e.message, 'error');
  }
}
window.uploadProfileAvatar = uploadProfileAvatar;

async function clearAllData() {
  showConfirm('清空全部数据', '此操作将永久删除你创建的所有表单和填写记录。\n\n请选择处理方式：', async () => {
    if (!supabase || !STATE.profile) return;
    // 删除所有表单（级联删除submissions）
    const { data: forms } = await _sb.from('forms').select('id').eq('user_id', STATE.user.id);
    if (forms && forms.length > 0) {
      for (const f of forms) {
        await _sb.from('forms').delete().eq('id', f.id);
      }
    }
    STATE.forms = [];
    STATE.submissions = [];
    showToast('所有数据已清空', 'success');
    renderDashboardContent($('#page-content'));
  }, { danger: true, confirmText: '确认清空' });
}
window.clearAllData = clearAllData;


// ================================================================
// 十六、新手指引
// ================================================================

function showOnboardingGuide() {
  if (!STATE.profile || STATE.profile.onboarding_done) return;

  const steps = [
    { title: '📋 创建表单', desc: '登录后点击「新建收集表单」，设置问卷板块和分享规则' },
    { title: '🔗 分享链接', desc: '生成专属分享链接，发给朋友填写，支持密码保护和次数限制' },
    { title: '📊 查看记录', desc: '在「填写记录」中查看所有人的填写内容，可收藏、添加备注和标签' }
  ];

  let step = 0;
  function showStep() {
    if (step >= steps.length) return closeGuide();
    const s = steps[step];
    const guide = document.createElement('div');
    guide.className = 'guide-tooltip';
    guide.style.cssText = 'top:50%;left:50%;transform:translate(-50%,-50%)';
    guide.innerHTML = `
      <div class="text-3xl mb-2">${s.title}</div>
      <p class="text-sm text-text-sec mb-4">${s.desc}</p>
      <div class="flex items-center justify-between gap-3">
        <button class="text-xs text-text-sec" id="guide-skip">跳过</button>
        <span class="text-xs text-text-sec">${step + 1}/${steps.length}</span>
        <button class="btn btn-primary btn-sm" id="guide-next">${step < steps.length - 1 ? '下一步' : '完成'}</button>
      </div>
    `;
    document.body.appendChild(guide);

    guide.querySelector('#guide-next').addEventListener('click', () => {
      guide.remove();
      step++;
      showStep();
    });
    guide.querySelector('#guide-skip').addEventListener('click', () => {
      guide.remove();
      closeGuide();
    });
  }

  function closeGuide() {
    if (STATE.profile && supabase) {
      _sb.from('profiles').update({ onboarding_done: true }).eq('id', STATE.user.id).then(() => {
        STATE.profile.onboarding_done = true;
      });
    }
  }

  setTimeout(showStep, 1000);
}

// ================================================================
// 十七、应用初始化
// ================================================================

function initApp() {
  initSupabase();

  // 注册路由（无登录模式）
  route('/', 'landing');
  route('/dashboard', 'dashboard');
  route('/fill/:formId', 'fill');
  route('/profile', 'profile');

  window.addEventListener('hashchange', handleRoute);

  // 访客填写页：跳过认证，直接渲染
  if (window.location.hash.includes('#/fill/')) {
    handleRoute();
    return;
  }

  // 其他页面：自动登录后渲染
  initAuth().then(() => {
    if (!STATE.session) {
      $('#page-content').innerHTML = `
        <div class="min-h-[80vh] flex flex-col items-center justify-center animate-fade-in">
          <svg width="64" height="72" viewBox="0 0 32 40"><use href="#icon-logo"/></svg>
          <p class="text-text-sec text-sm mt-4">正在连接...</p>
          <div class="loading-spinner mt-3"></div>
        </div>
      `;
    }
  });

  // 全局点击关闭菜单
  document.addEventListener('click', (e) => {
    const menu = $('#user-menu-wrap');
    const dropdown = $('#user-menu-dropdown');
    if (menu && dropdown && !menu.contains(e.target)) {
      dropdown.classList.add('hidden');
    }
  });

  applyTheme();

  // 移动端始终显示底部导航
  if (window.matchMedia('(max-width: 767px)').matches) {
    $('#bottom-nav').classList.remove('hidden');
  }

  console.log('💝 知意小记 — 无登录模式已就绪');
  console.log('📋 共', FORM_SECTIONS.length, '个问卷板块');
  console.log('🔗 Supabase:', supabase ? '已连接' : '未配置');
}

// 启动
document.addEventListener('DOMContentLoaded', initApp);

// ================================================================
// 十八、注册 Service Worker (PWA)
// ================================================================

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

// 监听 PWA 安装事件
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

// ================================================================
// 页面加载完成
// ================================================================
  </script>
</body>
