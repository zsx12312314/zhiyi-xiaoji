function $(s){return document.querySelector(s)}
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

var formData={};

try{formData=JSON.parse(localStorage.getItem(cacheKey)||'{}')}catch(e){}
if(!formData._identity)formData._identity={name:'',avatarMode:'none',avatarUrl:'',avatarCartoonId:''};

function saveCache(){localStorage.setItem(cacheKey,JSON.stringify(formData))}

function toggleOption(el,sectionId,qId,value,isExclusive,exclusiveVal){
  if(el.classList.contains('disabled'))return;
  if(!formData[sectionId])formData[sectionId]={};
  if(!formData[sectionId][qId])formData[sectionId][qId]=[];
  var arr=formData[sectionId][qId];
  if(isExclusive){
    arr.length=0;
    if(!arr.includes(value))arr.push(value);
    // Update all checkboxes in this question - disable non-exclusive ones
    var qBlock=el.closest('.question-block');
    if(qBlock){
      qBlock.querySelectorAll('.checkbox-wrap').forEach(function(cb){
        var v=cb.getAttribute('data-value');
        if(v===value){cb.classList.add('selected')}else{cb.classList.remove('selected')}
        cb.classList.toggle('disabled',v!==value);
      });
    }
  }else{
    if(exclusiveVal&&arr.includes(exclusiveVal)){arr.length=0;el.closest('.question-block').querySelectorAll('.checkbox-wrap').forEach(function(cb){cb.classList.remove('selected','disabled')})}
    var idx=arr.indexOf(value);
    if(idx>=0)arr.splice(idx,1);else arr.push(value);
    el.classList.toggle('selected');
    // Handle exclusive: if exclusive option now selected, disable others
    if(exclusiveVal&&arr.includes(exclusiveVal)){
      el.closest('.question-block').querySelectorAll('.checkbox-wrap').forEach(function(cb){
        var v=cb.getAttribute('data-value');
        if(v!==exclusiveVal&&!cb.classList.contains('other-wrap'))cb.classList.add('disabled');
        if(v===exclusiveVal)cb.classList.add('selected');
      });
    }
  }
  // Update status dot
  updateStatusDot(sectionId);
  // Update progress
  updateProgressBar();
  saveCache();
}

function updateStatusDot(sid){
  var has=false;
  FORM_SECTIONS.forEach(function(s){
    if(s.id!==sid)return;
    s.questions.forEach(function(q){var v=(formData[s.id]||{})[q.id];if(v&&(Array.isArray(v)?v.length>0:true))has=true});
  });
  var cards=document.querySelectorAll('.card');
  var idx=FORM_SECTIONS.findIndex(function(s){return s.id===sid});
  if(idx>=0&&cards[idx+1]){
    var dot=cards[idx+1].querySelector('.status-dot');
    if(dot)dot.className='status-dot'+(has?' filled':' empty');
  }
}

function updateProgressBar(){
  var total=0,filled=0;
  var ident=formData._identity||{};
  if(ident.name){filled++;total++}else total++;
  FORM_SECTIONS.forEach(function(sec){sec.questions.forEach(function(q){total++;var v=(formData[sec.id]||{})[q.id];if(v&&(Array.isArray(v)?v.length>0:true))filled++})});
  var pct=total>0?Math.round(filled/total*100):0;
  var pb=document.getElementById('progress');if(pb)pb.style.width=pct+'%';
}

  FORM_SECTIONS.forEach(function(sec,si){

      q.options.forEach(function(o){
        if(o.isOther)return;
        var sel=vals.includes(o.value);

      var oo=q.options.find(function(o){return o.isOther});
      if(oo){
        qHtml+='<div class="flex items-center gap-2 mt-1"><span class="text-xs text-text-sec">其他：</span><input type="text" class="input text-sm" placeholder="手动输入（最多'+(oo.maxChars||50)+'字）" maxlength="'+(oo.maxChars||50)+'" value="'+escapeHtml(oth)+'" oninput="setOther(\''+sec.id+'\',\''+q.id+'\',this.value)" style="min-height:32px;padding:4px 8px;flex:1"></div>';
      }
      qHtml+='</div>';
    });
    if(qHtml){
      h+='<div class="card"><div class="flex items-center gap-2 mb-2"><span class="status-dot'+(hasC?' filled':' empty')+'"></span><span class="font-medium text-sm">'+sec.icon+' '+escapeHtml(sec.title)+'</span></div><div class="pt-1">'+qHtml+'</div></div>';
    }
  });
  h+='<div class="bottom-bar"><button class="btn btn-ghost flex-1" onclick="resetForm()">重置</button><button class="btn btn-primary flex-1" id="submit-btn">提交记录</button></div>';
  document.getElementById('app').innerHTML=h;
  // Bind
  var ni=document.getElementById('ident-name');
  if(ni)ni.addEventListener('input',function(){formData._identity.name=this.value;saveCache()});
  var sb=document.getElementById('submit-btn');
  if(sb)sb.addEventListener('click',submitForm);
  // Progress
  var total=0,filled=0;
  if(ident.name){filled++;total++}else total++;
  FORM_SECTIONS.forEach(function(sec){sec.questions.forEach(function(q){total++;var v=(formData[sec.id]||{})[q.id];if(v&&(Array.isArray(v)?v.length>0:true))filled++})});
  var pct=total>0?Math.round(filled/total*100):0;
  var pb=document.getElementById('progress');if(pb)pb.style.width=pct+'%';
}

function resetForm(){
  formData={_identity:{name:'',avatarMode:'none',avatarUrl:'',avatarCartoonId:''}};
  saveCache();render();
}

async function submitForm(){
  var name=(formData._identity||{}).name||'';
  if(!name.trim()){alert('请填写昵称');return}
  if(!_sb){alert('提交失败：网络未连接');return}
  var btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='提交中...';
  try{
    var data={_identity:formData._identity};
    FORM_SECTIONS.forEach(function(sec){
      var sd=formData[sec.id]||{};
      sec.questions.forEach(function(q){
        var k=sec.id+'_'+q.id;
        var v=sd[q.id]||[];
        var o=sd[q.id+'_other'];
        if(o&&v.includes('other')){var nv=v.slice();nv[nv.indexOf('other')]='other:'+o;data[k]=nv}else data[k]=v;
      });
    });
    await _sb.from('submissions').insert({form_id:formId,submitter_name:name.trim(),data:data,device_fingerprint:'web_'+nanoid(16)});
    localStorage.removeItem(cacheKey);
    document.getElementById('app').innerHTML='<div class="text-center py-16"><div class="text-5xl mb-4">🎉</div><h2 class="text-xl font-semibold">提交成功！感谢你的填写</h2></div>';
  }catch(e){
    alert('提交失败：'+(e.message||'网络错误'));
    btn.disabled=false;btn.textContent='提交记录';
  }
}

render();
</script>
</body>
</html>
